<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <style>
        :root {
            --bg-color: #0b0c10; --card-color: #1f2833; --cyan: #46a29f;
            --neon-cyan: #66fcf1; --pink: #ff2e63; --success-green: #2ecc71;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background: var(--bg-color); color: #fff; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card-color); padding: 25px; border-radius: 15px; border: 1px solid #2f3b4c; }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        button { width: 100%; padding: 14px; font-size: 15px; font-weight: bold; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-connect { background: var(--cyan); color: #fff; }
        .btn-action { background: #111; color: var(--neon-cyan); border: 1px solid var(--cyan); }
        .btn-action:hover { background: var(--cyan); color: #000; }
        .terminal { background: #000; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; height: 280px; overflow-y: auto; font-family: monospace; font-size: 11px; text-align: left; }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Xiaomi E-Scooter 5 • MiOT Kontrol Merkezi</p>
    
    <button class="btn-connect" onclick="connectToXiaomi()">1. Scooter'a Bağlan (001c Hattı)</button>
    <button class="btn-action" onclick="sendXiaomiCommand('zerostart')">2. Zero Start Aktif Et (0 km/h)</button>
    <button class="btn-action" onclick="sendXiaomiCommand('speedlimit')">3. Hız Limitini Güncelle (22 km/h)</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Xiaomi MiOT sürücüsü hazır. Resmi kanal: 0x01</div>
    </div>
</div>

<script>
    let xiaomiCharacteristic = null;

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectToXiaomi() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['fe95']
            });

            printLog(`Cihaz Bulundu: ${device.name}`, "info");
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('fe95');
            const characteristics = await service.getCharacteristics();

            for (let char of characteristics) {
                let fullUuid = char.uuid.toLowerCase();
                let shortUuid = fullUuid.includes('-') ? fullUuid.split('-')[0].slice(-4) : fullUuid.slice(-4);
                
                if (shortUuid === '001c') {
                    xiaomiCharacteristic = char;
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        let value = e.target.value;
                        let hexArray = [];
                        for (let i = 0; i < value.byteLength; i++) {
                            hexArray.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
                        }
                        printLog(`📩 RX (Cevap): ${hexArray.join(' ')}`, "success");
                    });
                    printLog("🎯 Xiaomi 001c komut kanalı başarıyla bağlandı ve doğrulandı!", "neon");
                }
            }
        } catch (error) {
            printLog(`Bağlantı Hatası: ${error.message}`, "pink");
        }
    }

    // Xiaomi MiOT Write Property paket oluşturucu [01 + Tip + Uzunluk + Veri + Checksum]
    function buildMiOTPacket(typeByte, payloadArray) {
        let header = 0x01;
        let len = payloadArray.length;
        let packet = [header, typeByte, len];
        packet = packet.concat(payloadArray);
        
        // Basit MiOT veri doğrulama toplamı (Checksum) ekleme
        let checksum = 0;
        for (let i = 0; i < packet.length; i++) {
            checksum += packet[i];
        }
        packet.push(checksum & 0xFF);
        
        return new Uint8Array(packet);
    }

    async function sendXiaomiCommand(action) {
        if (!xiaomiCharacteristic) return printLog("Hata: Önce scooter'a bağlanın!", "pink");

        let packet;
        if (action === 'zerostart') {
            printLog("TX -> Zero Start (0 km/h) yapılandırması gönderiliyor...", "info");
            // Tip: 0x03 (Ayar), Veri: [0x02, 0x01, 0x00] (Kalkış parametreleri)
            packet = buildMiOTPacket(0x03, [0x02, 0x01, 0x00]);
        } else if (action === 'speedlimit') {
            printLog("TX -> Hız limiti (22 km/h) şablonu gönderiliyor...", "info");
            // Tip: 0x04 (Performans), Veri: [0x22, 0x00] 
            packet = buildMiOTPacket(0x04, [0x22, 0x00]);
        }

        try {
            await xiaomiCharacteristic.writeValue(packet);
            let hexArray = Array.from(packet).map(b => b.toString(16).padStart(2, '0').toUpperCase());
            printLog(`🚀 Paket İletildi: ${hexArray.join(' ')}`, "neon");
        } catch (err) {
            printLog(`Gönderim Hatası: ${err.message}`, "pink");
        }
    }
</script>

</body>
</html>
