<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10; --card-color: #1f2833; --cyan: #46a29f;
            --neon-cyan: #66fcf1; --pink: #ff2e63; --warning: #ff9f43;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background: var(--bg-color); color: #fff; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card-color); padding: 25px; border-radius: 15px; border: 1px solid #2f3b4c; }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        .token-box { margin: 15px 0 20px 0; text-align: left; }
        .token-box label { font-size: 11px; color: var(--cyan); font-weight: bold; }
        .token-box input { width: 100%; padding: 12px; margin-top: 6px; background: #000; border: 1px solid #2f3b4c; color: var(--neon-cyan); font-family: monospace; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; font-size: 15px; font-weight: bold; margin: 6px 0; border: none; border-radius: 8px; cursor: pointer; }
        .btn-connect { background: var(--cyan); color: #fff; }
        .btn-auth { background: var(--warning); color: #000; }
        .btn-action { background: #111; color: var(--neon-cyan); border: 1px solid var(--cyan); }
        .terminal { background: #000; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; height: 260px; overflow-y: auto; font-family: monospace; font-size: 11px; text-align: left; }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Xiaomi 5 / Dreame Kripto El Sıkışma Modülü</p>
    
    <div class="token-box">
        <label>Mi Cloud Bind Key (Token):</label>
        <input type="text" id="beacon-token" value="1b312ff647fd86867d7d5dc3">
    </div>

    <button class="btn-connect" onclick="connectScooter()">1. Scooter'a Bağlan (001c)</button>
    <button class="btn-auth" onclick="startSecureHandshake()">🔐 2. Güvenli El Sıkışmayı Başlat</button>
    <button class="btn-action" onclick="sendSecureCommand('zerostart')">3. Yetkili Zero Start Gönder</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Kripto el sıkışma katmanı yüklendi.</div>
    </div>
</div>

<script>
    let scooterChar = null;
    let serverChallenge = null;

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        if (type === 'warning') color = '#ff9f43';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectScooter() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['fe95']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('fe95');
            scooterChar = await service.getCharacteristic('001c');

            await scooterChar.startNotifications();
            scooterChar.addEventListener('characteristicvaluechanged', handleScooterResponse);
            printLog("🎯 Kanal 001c bağlandı. Adım 2: El sıkışmayı başlatın.", "success");

        } catch (error) {
            printLog(`Bağlantı Hatası: ${error.message}`, "pink");
        }
    }

    // Scooter'dan gelen her yanıtı analiz eden ana fonksiyon
    function handleScooterResponse(event) {
        let value = event.target.value;
        let hexArray = [];
        for (let i = 0; i < value.byteLength; i++) {
            hexArray.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
        }
        let responseHex = hexArray.join(' ');
        printLog(`📩 RX: ${responseHex}`, "warning");

        // EĞER yanıt bir el sıkışma meydan okumasıysa (Genelde 01 10 ile başlar ve uzundur)
        if (hexArray[0] === '01' && hexArray.length > 8 && responseHex.includes("30 30") === false) {
            // Scooter bize şifrelememiz için rastgele veri fırlattı!
            serverChallenge = hexArray.slice(3); // Protokol başlıklarını kes, saf veriyi al
            printLog(`🎲 Scooter'dan Rastgele Şifreleme Anahtarı (Challenge) Alındı!`, "neon");
            processAndSendResponse(serverChallenge);
        }
    }

    // Resmi MiOT el sıkışma isteği (Adım 2)
    async function startSecureHandshake() {
        if (!scooterChar) return printLog("Hata: Önce bağlantı kurun!", "pink");
        
        printLog("TX -> El sıkışma isteği (Challenge Request) gönderiliyor...", "info");
        // Resmi Xiaomi BLE Auth token talep paketi şablonu
        let authRequest = new Uint8Array([0x01, 0x00, 0x04, 0x01, 0x02, 0x03, 0x04]);
        await scooterChar.writeValue(authRequest);
    }

    // Alınan rastgele sayıyı Token ile AES şifreleme aşaması
    async function processAndSendResponse(challengeBytes) {
        let tokenInput = document.getElementById('beacon-token').value.trim();
        printLog(`🔑 Elinizdeki Token kullanılıyor: ${tokenInput}`, "info");

        try {
            // CryptoJS için format dönüşümleri
            let key = CryptoJS.enc.Hex.parse(tokenInput);
            let hexChallenge = challengeBytes.join('');
            let data = CryptoJS.enc.Hex.parse(hexChallenge);

            // AES-128 ECB Modunda şifreleme (Xiaomi Güvenlik Standartı)
            let encrypted = CryptoJS.AES.encrypt(data, key, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.NoPadding
            });

            let encryptedHex = encrypted.ciphertext.toString(CryptoJS.enc.Hex).toUpperCase();
            let encryptedBytes = encryptedHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16));

            // Paket oluşturma: [0x01, 0x01 (Auth yanıtı), Uzunluk, ...Şifreli Veri...]
            let responsePacket = new Uint8Array([0x01, 0x01, encryptedBytes.length].concat(encryptedBytes));
            
            printLog("🚀 AES ile imzalanmış Güvenlik Paketi scooter'a gönderiliyor...", "info");
            await scooterChar.writeValue(responsePacket);
            printLog("⚡ İmza iletildi! Scooter'ın onay vermesi bekleniyor...", "neon");

        } catch (err) {
            printLog(`Kripto Hatası: ${err.message}`, "pink");
        }
    }

    // Yetki alındıktan sonra gönderilecek gerçek komut fonksiyonu
    async function sendSecureCommand(type) {
        if (!scooterChar) return printLog("Hata: Bağlantı yok!", "pink");
        
        if (type === 'zerostart') {
            printLog("TX -> Yetkili kalkış parametresi yazılıyor...", "info");
            let cmd = new Uint8Array([0x01, 0x03, 0x03, 0x02, 0x01, 0x00, 0x07]); // Örnek MiOT imza paketi
            await scooterChar.writeValue(cmd);
        }
    }
</script>

</body>
</html>
