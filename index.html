<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --cyan: #46a29f;
            --neon-cyan: #66fcf1;
            --pink: #ff2e63;
            --warning-orange: #ff9f43;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: var(--bg-color); 
            color: #fff; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2f3b4c;
        }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        
        .token-box { margin: 15px 0 20px 0; text-align: left; }
        .token-box label { font-size: 11px; color: var(--cyan); font-weight: bold; text-transform: uppercase; }
        .token-box input {
            width: 100%; padding: 12px; margin-top: 6px; background: #000; border: 1px solid #2f3b4c;
            color: var(--neon-cyan); font-family: 'Courier New', Courier, monospace; font-size: 14px; border-radius: 6px; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 14px; font-size: 16px; font-weight: bold; margin: 6px 0; 
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-connect { background: var(--cyan); color: #fff; box-shadow: 0 4px 15px rgba(70,162,159,0.3); }
        .btn-action { background: #2f3b4c; color: #fff; border: 1px solid var(--cyan); }
        .btn-hazard { background: rgba(255, 159, 67, 0.1); color: var(--warning-orange); border: 1px solid var(--warning-orange); }
        .btn-hazard.active { background: var(--warning-orange); color: #000; }

        .terminal {
            background: #000; border: 1px solid #333; border-radius: 8px; padding: 15px;
            margin-top: 20px; height: 220px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 11px; text-align: left;
        }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Xiaomi 5 / Dreame Protokol Analizörü</p>
    
    <div class="token-box">
        <label>Mi Cloud Bind Key (Token):</label>
        <input type="text" id="beacon-token" value="1b312ff647fd86867d7d5dc3">
    </div>

    <button class="btn-connect" onclick="connectAndListen()">1. Scooter'a Bağlan & Canlı Dinle</button>
    <button class="btn-action" onclick="setZeroStart()">2. Zero Start Aktif Et</button>
    <button class="btn-action" onclick="setSpeed22()">3. Hızı 22 km/h Yap</button>
    <button class="btn-hazard" id="hazard-btn" onclick="toggleHazards()">4. Dörtlüleri & Sesi Aç</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Karşılıklı doğrulama modu hazır.</div>
    </div>
</div>

<script>
    let scooterCharacteristic = null;
    let authCharacteristic = null;
    let hazardsActive = false;
    let hazardInterval = null;

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        if (type === 'warning') color = '#ff9f43';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectAndListen() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['fe95']
            });

            printLog(`Cihaz bağlandı: ${device.name}`, "info");
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('fe95');
            const characteristics = await service.getCharacteristics();

            for (let char of characteristics) {
                let uuid = char.uuid.toLowerCase();
                // 0010 veya 00000010 içeren kanal Xiaomi'nin Auth/Notification kanalıdır
                if (uuid.includes('0010') || uuid.includes('00000010')) {
                    authCharacteristic = char;
                }
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    scooterCharacteristic = char;
                }
            }

            // CANLI DİNLEME MODUNU AÇIYORUZ
            if (authCharacteristic && authCharacteristic.properties.notify) {
                printLog("📡 Scooter canlı veri hattı dinlemeye alınıyor...", "warning");
                await authCharacteristic.startNotifications();
                authCharacteristic.addEventListener('characteristicvaluechanged', handleScooterResponse);
                printLog("🔔 Dinleme Aktif! Scooter'dan gelecek şifreleme meydan okuması bekleniyor...", "success");
                
                // İlk tetikleme paketini gönderelim ki scooter bize şifreleme için challenge (nonce) fırlatsın
                let trigger = new Uint8Array([0x01, 0x00]);
                await authCharacteristic.writeValue(trigger);
                printLog("TX -> El sıkışma isteği gönderildi.", "info");
            } else {
                printLog("⚠️ Bildirim kanalı bulunamadı, düz yazma modu denenecek.", "pink");
            }

        } catch (error) {
            printLog(`Bağlantı Hatası: ${error.message}`, "pink");
        }
    }

    // SCOOTER'DAN GELEN CEVAPLARI ANLIK YAKALAYAN FONKSİYON
    function handleScooterResponse(event) {
        let value = event.target.value;
        let hexArray = [];
        for (let i = 0; i < value.byteLength; i++) {
            let hex = value.getUint8(i).toString(16).padStart(2, '0').toUpperCase();
            hexArray.push("0x" + hex);
        }
        // Scooter'ın gönderdiği ham byte verisini direkt ekrana basıyoruz
        printLog(`📩 RX (Scooter Cevabı): [${hexArray.join(', ')}]`, "neon");
    }

    function createPacket(payload) {
        let header = [0x55, 0xAA];
        let len = payload.length;
        let packet = header.concat([len], payload);
        let sum = 0;
        for(let i = 2; i < packet.length; i++) sum += packet[i];
        let checksum = (sum ^ 0xFFFF) & 0xFFFF;
        packet.push(checksum & 0xFF); packet.push((checksum >> 8) & 0xFF);
        return new Uint8Array(packet);
    }

    async function setZeroStart() {
        if (!scooterCharacteristic) return printLog("Hata: Önce bağlantı kurun!", "pink");
        try {
            await scooterCharacteristic.writeValue(createPacket([0x03, 0x20, 0x3A, 0x00]));
            printLog("🚀 Zero Start Gönderildi!", "success");
        } catch(err) { printLog(`Hata: ${err.message}`, "pink"); }
    }

    async function setSpeed22() {
        if (!scooterCharacteristic) return printLog("Hata: Önce bağlantı kurun!", "pink");
        try {
            await scooterCharacteristic.writeValue(createPacket([0x03, 0x20, 0x3B, 0x16]));
            printLog("⚡ Hız Limiti Gönderildi!", "success");
        } catch(err) { printLog(`Hata: ${err.message}`, "pink"); }
    }

    async function toggleHazards() {
        if (!scooterCharacteristic) return printLog("Hata: Önce bağlantı kurun!", "pink");
        const btn = document.getElementById('hazard-btn');
        if (!hazardsActive) {
            hazardsActive = true; btn.classList.add('active'); btn.innerText = "Dörtlüleri Kapat";
            hazardInterval = setInterval(async () => {
                try {
                    let cmd = hazardsActive ? [0x03, 0x22, 0x78, 0x03] : [0x03, 0x22, 0x78, 0x00];
                    await scooterCharacteristic.writeValue(createPacket(cmd));
                } catch (e) {}
            }, 600);
        } else {
            hazardsActive = false; clearInterval(hazardInterval); btn.classList.remove('active'); btn.innerText = "4. Dörtlüleri & Sesi Aç";
            try { await scooterCharacteristic.writeValue(createPacket([0x03, 0x22, 0x78, 0x00])); } catch(e) {}
        }
    }
</script>

</body>
</html>
