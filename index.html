<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <style>
        :root {
            --bg-color: #0b0c10; --card-color: #1f2833; --cyan: #46a29f;
            --neon-cyan: #66fcf1; --pink: #ff2e63; --warning-orange: #ff9f43;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background: var(--bg-color); color: #fff; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card-color); padding: 25px; border-radius: 15px; border: 1px solid #2f3b4c; }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        .token-box { margin: 15px 0 20px 0; text-align: left; }
        .token-box label { font-size: 11px; color: var(--cyan); font-weight: bold; }
        .token-box input { width: 100%; padding: 12px; margin-top: 6px; background: #000; border: 1px solid #2f3b4c; color: var(--neon-cyan); font-family: monospace; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; margin: 6px 0; border: none; border-radius: 8px; cursor: pointer; }
        .btn-connect { background: var(--cyan); color: #fff; }
        .btn-auth { background: var(--warning-orange); color: #000; }
        .btn-action { background: #2f3b4c; color: #fff; border: 1px solid var(--cyan); }
        .terminal { background: #000; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; height: 260px; overflow-y: auto; font-family: monospace; font-size: 11px; text-align: left; }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Xiaomi 5 / Dreame Secure Oturum Yönetimi</p>
    
    <div class="token-box">
        <label>Mi Cloud Bind Key (Token):</label>
        <input type="text" id="beacon-token" value="1b312ff647fd86867d7d5dc3">
    </div>

    <button class="btn-connect" onclick="connectAndListen()">1. Bağlan & Kanalları Dinle</button>
    <button class="btn-auth" onclick="authenticateWithToken()">🔐 2. Güvenli El Sıkışmayı Başlat</button>
    <button class="btn-action" onclick="setZeroStart()">3. Zero Start Dene</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Oturum yönetim modülü hazır.</div>
    </div>
</div>

<script>
    let writeCharacteristic = null;
    let authCharacteristic = null;

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        if (type === 'warning') color = '#ff9f43';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectAndListen() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['fe95']
            });

            printLog(`Cihaz bağlandı: ${device.name}`, "info");
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('fe95');
            const characteristics = await service.getCharacteristics();

            for (let char of characteristics) {
                // Tam UUID yapısından kısa 4 haneli ID'yi güvenli çıkarıyoruz
                let fullUuid = char.uuid.toLowerCase();
                let shortUuid = fullUuid.includes('-') ? fullUuid.split('-')[0].slice(-4) : fullUuid.slice(-4);
                
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    writeCharacteristic = char;
                }
                
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => handleScooterResponse(e, shortUuid));
                    printLog(`🔔 Kanal [${shortUuid}] dinlemeye alındı.`, "success");
                    
                    // Eğer 0010 veya benzeri yetki kanalıysa auth için sakla
                    if (shortUuid.includes('10') || shortUuid.includes('0010')) {
                        authCharacteristic = char;
                    }
                }
            }
            printLog("🎯 Bağlantı stabil. Lütfen 'Güvenli El Sıkışmayı Başlat' butonuna basın.", "neon");

        } catch (error) {
            printLog(`Bağlantı Hatası: ${error.message}`, "pink");
        }
    }

    function handleScooterResponse(event, channelId) {
        let value = event.target.value;
        let hexArray = [];
        for (let i = 0; i < value.byteLength; i++) {
            hexArray.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
        }
        printLog(`📩 RX [Kanal ${channelId}]: ${hexArray.join(' ')}`, "warning");
    }

    // YENİ ADIM: Token kullanarak oturum imzasını gönderme
    async function authenticateWithToken() {
        let targetChar = authCharacteristic || writeCharacteristic;
        if (!targetChar) return printLog("Hata: Önce cihaza bağlanın!", "pink");

        let tokenStr = document.getElementById('beacon-token').value.trim();
        if (tokenStr.length !== 24) return printLog("Hata: Geçersiz token uzunluğu!", "pink");

        // Token stringini byte dizisine dönüştür
        let tokenBytes = [];
        for (let i = 0; i < tokenStr.length; i += 2) {
            tokenBytes.push(parseInt(tokenStr.substr(i, 2), 16));
        }

        // Xiaomi IoT Protokolü Oturum Açma İmzası (0x01, 0x00 + Token ilk 6 byte veya tamamı)
        let authPayload = new Uint8Array([0x01, 0x00, ...tokenBytes.slice(0, 8)]);
        
        printLog("TX -> Kripto el sıkışma imzası gönderiliyor...", "info");
        try {
            await targetChar.writeValue(authPayload);
            printLog("🔑 İmza iletildi! Cihazdan gelecek doğrulama yanıtı bekleniyor...", "neon");
        } catch (err) {
            printLog(`Auth Hatası: ${err.message}`, "pink");
        }
    }

    function createPacket(payload) {
        let header = [0x55, 0xAA];
        let len = payload.length;
        let packet = header.concat([len], payload);
        let sum = 0;
        for(let i = 2; i < packet.length; i++) sum += packet[i];
        let checksum = (sum ^ 0xFFFF) & 0xFFFF;
        packet.push(checksum & 0xFF); packet.push((checksum >> 8) & 0xFF);
        return new Uint8Array(packet);
    }

    async function setZeroStart() {
        if (!writeCharacteristic) return printLog("Hata: Önce bağlanın!", "pink");
        try {
            await writeCharacteristic.writeValue(createPacket([0x03, 0x20, 0x3A, 0x00]));
            printLog("TX -> Zero Start Komutu Gönderildi.", "info");
        } catch(err) { printLog(`Hata: ${err.message}`, "pink"); }
    }
</script>

</body>
</html>
