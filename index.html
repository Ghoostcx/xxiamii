<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble MiOT Protocol Cracker</title>
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --neon: #66fcf1; --pink: #ff2e63; --yellow: #f1c40f; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #2f3b4c; }
        button { width: 100%; padding: 12px; margin: 6px 0; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; }
        .btn-main { background: #46a29f; color: white; }
        .btn-prob { background: #111; color: var(--yellow); border: 1px solid var(--yellow); }
        .terminal { background: #000; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-top: 15px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 11px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tooble MiOT Protocol Cracker</h2>
    <p>Xiaomi E-Scooter 5 • Gelişmiş Paket Sürücüsü</p>
    
    <button class="btn-main" onclick="connectScooter()">1. Scooter'a Bağlan (001c)</button>
    <button class="btn-prob" onclick="sendMiOTVaryasyon(1)">Varyasyon A (Standart Set)</button>
    <button class="btn-prob" onclick="sendMiOTVaryasyon(2)">Varyasyon B (Sorgu Modu)</button>
    <button class="btn-prob" onclick="sendMiOTVaryasyon(3)">Varyasyon C (Kalkış Kilidi Kırıcı)</button>

    <div class="terminal" id="console">
        <div>[Sistem] Test modülü hazır. Sadece 001c hattına odaklanılıyor.</div>
    </div>
</div>

<script>
    let myChar = null;

    function log(msg, color = '#fff') {
        const c = document.getElementById('console');
        c.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    async function connectScooter() {
        try {
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['fe95'] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('fe95');
            myChar = await service.getCharacteristic('001c');
            await myChar.startNotifications();
            myChar.addEventListener('characteristicvaluechanged', (e) => {
                let buf = e.target.value;
                let arr = [];
                for (let i = 0; i < buf.byteLength; i++) arr.push(buf.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
                log(`📩 RX: ${arr.join(' ')}`, '#2ecc71');
            });
            log("🎯 001c Hattı bağlandı! Varyasyonları sırayla deneyebiliriz.", "#66fcf1");
        } catch (err) { log(`Hata: ${err.message}`, '#ff2e63'); }
    }

    async function sendMiOTVaryasyon(type) {
        if (!myChar) return log("Önce scooter'a bağlanın!", "#ff2e63");
        let pkt;
        
        if (type === 1) {
            // [Header, Opcode(Set), Siid(3), Piid(3), ValueType, Value] + Keskin uzunluk kontrolü
            pkt = new Uint8Array([0x01, 0x02, 0x03, 0x03, 0x01, 0x01]);
            log("TX -> Varyasyon A (Standart Set) gönderiliyor...");
        } else if (type === 2) {
            // MiOT RPC formatı (Geri bildirim isteme metodu)
            pkt = new Uint8Array([0x01, 0x01, 0x01, 0x03, 0x02]);
            log("TX -> Varyasyon B (Sorgu Modu) gönderiliyor...");
        } else if (type === 3) {
            // Dreame işlemcileri için özel haritalandırılmış direkt tetikleyici paket
            pkt = new Uint8Array([0x01, 0x03, 0x02, 0x01, 0x00, 0x00, 0x00]);
            log("TX -> Varyasyon C (Kalkış Kilidi Kırıcı) gönderiliyor...");
        }

        try {
            await myChar.writeValue(pkt);
        } catch (e) { log(`Gönderim Hatası: ${e.message}`, '#ff2e63'); }
    }
</script>
</body>
</html>
