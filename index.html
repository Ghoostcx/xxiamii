<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --cyan: #46a29f;
            --neon-cyan: #66fcf1;
            --pink: #ff2e63;
            --warning-orange: #ff9f43;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: var(--bg-color); 
            color: #fff; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2f3b4c;
        }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        
        button { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold;
            margin: 8px 0; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .btn-connect { background: var(--cyan); color: #fff; box-shadow: 0 4px 15px rgba(70,162,159,0.3); }
        .btn-connect:active { background: var(--neon-cyan); color: #000; }
        .btn-action { background: #2f3b4c; color: #fff; border: 1px solid var(--cyan); }
        .btn-action:active { background: var(--cyan); }
        
        /* Dörtlü Flaşör Buton Stili */
        .btn-hazard { 
            background: rgba(255, 159, 67, 0.2); 
            color: var(--warning-orange); 
            border: 2px dashed var(--warning-orange); 
        }
        .btn-hazard.active {
            background: var(--warning-orange);
            color: #000;
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.6; }
        }

        .terminal {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            height: 240px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
        }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Mühendislik & Eğitim Tabanlı Donanım Kontrolü</p>
    
    <button class="btn-connect" onclick="connectScooter()">1. Scooter'a Bağlan</button>
    <button class="btn-action" onclick="setZeroStart()">2. Zero Start Aktif Et (0 km/h)</button>
    <button class="btn-action" onclick="setSpeed22()">3. Hızı 22 km/h Yap</button>
    
    <button class="btn-hazard" id="hazard-btn" onclick="toggleHazards()">4. Dörtlüleri & Sesi Aç (Flaşör)</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Flaşör ve Diagnostic Modu Entegre Edildi.</div>
    </div>
</div>

<script>
    let scooterCharacteristic = null;
    let hazardsActive = false;
    let hazardInterval = null;

    const ALLOWED_SERVICES = [
        'fe95', '0000fe95-0000-1000-8000-00805f9b34fb',
        'e0ff', '0000e0ff-0000-1000-8000-00805f9b34fb'
    ];

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        if (type === 'warning') color = '#ff9f43';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectScooter() {
        scooterCharacteristic = null;
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ALLOWED_SERVICES
            });

            printLog(`Cihaz: ${device.name}. Bağlanılıyor...`, "info");
            const server = await device.gatt.connect();
            
            let targetService = null;
            try {
                targetService = await server.getPrimaryService('fe95');
                printLog("🎉 FE95 Güvenlik Servisine Giriş Yapıldı!", "success");
            } catch(e) {
                targetService = await server.getPrimaryService('0000fe95-0000-1000-8000-00805f9b34fb');
            }

            const characteristics = await targetService.getCharacteristics();
            for (let char of characteristics) {
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    scooterCharacteristic = char;
                    printLog(`🎯 Yazma Kanalı Bağlandı: ${char.uuid.substring(0,8)}`, "success");
                    break;
                }
            }

            printLog("SİSTEM HAZIR. Komutları gönderebilirsiniz.", "neon");

        } catch (error) {
            printLog(`Bağlantı Hatası: ${error}`, "pink");
        }
    }

    function createPacket(payload) {
        let header = [0x55, 0xAA];
        let len = payload.length;
        let packet = header.concat([len], payload);
        let sum = 0;
        for(let i = 2; i < packet.length; i++) sum += packet[i];
        let checksum = (sum ^ 0xFFFF) & 0xFFFF;
        packet.push(checksum & 0xFF);
        packet.push((checksum >> 8) & 0xFF);
        return new Uint8Array(packet);
    }

    async function setZeroStart() {
        if (!scooterCharacteristic) {
            printLog("Hata: Önce bağlantı kurun!", "pink");
            return;
        }
        let packet = createPacket([0x03, 0x20, 0x3A, 0x00]);
        try {
            printLog("TX -> Zero Start gönderiliyor...", "info");
            await scooterCharacteristic.writeValue(packet);
            printLog("Paket İletildi! Scooter yanıtı bekleniyor...", "success");
        } catch(err) {
            printLog(`🚨 YAZMA HATASI: ${err.name} - ${err.message}`, "pink");
        }
    }

    async function setSpeed22() {
        if (!scooterCharacteristic) {
            printLog("Hata: Önce bağlantı kurun!", "pink");
            return;
        }
        let packet = createPacket([0x03, 0x20, 0x3B, 0x16]);
        try {
            printLog("TX -> Hız limiti gönderiliyor...", "info");
            await scooterCharacteristic.writeValue(packet);
            printLog("Paket İletildi! Scooter yanıtı bekleniyor...", "success");
        } catch(err) {
            printLog(`🚨 YAZMA HATASI: ${err.name} - ${err.message}`, "pink");
        }
    }

    // DÖRTLÜ FLAŞÖR VE SES TETİKLEME ALGORİTMASI
    async function toggleHazards() {
        if (!scooterCharacteristic) {
            printLog("Hata: Önce bağlantı kurun!", "pink");
            return;
        }

        const btn = document.getElementById('hazard-btn');

        if (!hazardsActive) {
            // Flaşörü Başlat
            hazardsActive = true;
            btn.classList.add('active');
            btn.innerText = "Dörtlüleri & Sesi Kapat";
            printLog("🚨 Dörtlü flaşör ve ses döngüsü başlatıldı!", "warning");

            let toggleState = 0;
            hazardInterval = setInterval(async () => {
                try {
                    let packet;
                    if (toggleState === 0) {
                        // Sinyalleri Aç + Buzzer Ses Çıkar Komutu (Hem ses hem ışık register'ı)
                        // Xiaomi/Dreame uyumlu genel uyarı/bip ve ışık paketi varyasyonu
                        packet = createPacket([0x03, 0x22, 0x78, 0x03]); 
                        toggleState = 1;
                    } else {
                        // Kapatma komutu
                        packet = createPacket([0x03, 0x22, 0x78, 0x00]); 
                        toggleState = 0;
                    }
                    await scooterCharacteristic.writeValue(packet);
                } catch (err) {
                    printLog(`Flaşör Döngü Hatası: ${err.message}`, "pink");
                }
            }, 600); // Her 600 milisaniyede bir yanıp söner ve öter

        } else {
            // Flaşörü Durdur
            hazardsActive = false;
            clearInterval(hazardInterval);
            btn.classList.remove('active');
            btn.innerText = "4. Dörtlüleri & Sesi Aç (Flaşör)";
            printLog("🛑 Flaşör döngüsü durduruldu.", "info");

            // Son olarak her şeyi kapatma paketi gönderelim ki açık kalmasın
            try {
                let clearPacket = createPacket([0x03, 0x22, 0x78, 0x00]);
                await scooterCharacteristic.writeValue(clearPacket);
            } catch(e) {}
        }
    }
</script>

</body>
</html>
