<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooble Scooter Firmware Tool</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --cyan: #46a29f;
            --neon-cyan: #66fcf1;
            --pink: #ff2e63;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: var(--bg-color); 
            color: #fff; 
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2f3b4c;
        }
        h1 { font-size: 24px; color: var(--neon-cyan); margin-bottom: 5px; }
        p { color: #85929e; font-size: 14px; margin-top: 0; }
        
        button { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold;
            margin: 8px 0; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .btn-connect { background: var(--cyan); color: #fff; box-shadow: 0 4px 15px rgba(70,162,159,0.3); }
        .btn-connect:active { background: var(--neon-cyan); color: #000; }
        .btn-action { background: #2f3b4c; color: #fff; border: 1px solid var(--cyan); }
        .btn-action:active { background: var(--cyan); }
        
        #browser-warning {
            display: none;
            background: rgba(255, 46, 99, 0.2);
            border: 1px solid var(--pink);
            color: #ff85a2;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: left;
        }

        .terminal {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            height: 240px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
        }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tooble Scooter Firmware Tool</h1>
    <p>Mühendislik & Eğitim Tabanlı Donanım Kontrolü</p>
    
    <div id="browser-warning">
        <strong>⚠️ UYARI:</strong> Tarayıcı Web Bluetooth desteklemiyor! Bluefy içerisinden açın.
    </div>
    
    <button class="btn-connect" onclick="connectScooter()">1. Scooter'a Bağlan</button>
    <button class="btn-action" onclick="setZeroStart()">2. Zero Start Aktif Et (0 km/h)</button>
    <button class="btn-action" onclick="setSpeed22()">3. Hızı 22 km/h Yap</button>

    <div class="terminal" id="terminal-console">
        <div class="log-entry"><span class="log-time">[Sistem]</span> Diagnostic port taraıcı aktif. Bağlantı bekleniyor...</div>
    </div>
</div>

<script>
    let scooterCharacteristic = null;

    // Genişletilmiş ve Yeni Nesil Dreame/Xiaomi Protokol Listesi
    const SCOOTER_PROTOCOLS = [
        { service: '0000fe95-0000-1000-8000-00805f9b34fb', char: '0000fe96-0000-1000-8000-00805f9b34fb', name: 'Xiaomi 4/5 / Dreame IoT Kapısı' },
        { service: '0000e0ff-0000-1000-8000-00805f9b34fb', char: '0000e1ff-0000-1000-8000-00805f9b34fb', name: 'Xiaomi Klasik / M365 Kapısı' },
        { service: '0000af00-0000-1000-8000-00805f9b34fb', char: '0000af01-0000-1000-8000-00805f9b34fb', name: 'Ninebot / Xiaomi Yeni Sürüm' },
        { service: '6e400001-b5a3-f393-e0a9-e50e24dcca9e', char: '6e400002-b5a3-f393-e0a9-e50e24dcca9e', name: 'Dreame Custom UART Kapısı' },
        { service: '0000fefb-0000-1000-8000-00805f9b34fb', char: '0000fefc-0000-1000-8000-00805f9b34fb', name: 'Alternatif Güvenli Kapı' }
    ];

    window.onload = function() {
        if (!navigator.bluetooth) {
            document.getElementById('browser-warning').style.display = 'block';
        } else {
            printLog("Web Bluetooth API Aktif. Bağlanmaya hazır.", "neon");
        }
    };

    function printLog(message, type = 'info') {
        const consoleEl = document.getElementById('terminal-console');
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'pink') color = '#ff2e63';
        if (type === 'neon') color = '#66fcf1';
        if (type === 'success') color = '#2ecc71';
        consoleEl.innerHTML += `<div class="log-entry" style="color: ${color}"><span class="log-time">[${time}]</span> ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function connectScooter() {
        if (!navigator.bluetooth) {
            printLog("Hata: Desteklenmeyen tarayıcı!", "pink");
            return;
        }
        
        printLog("Cihaz araması tetiklendi...", "info");
        try {
            const allowedServices = SCOOTER_PROTOCOLS.map(p => p.service);
            
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: allowedServices
            });

            printLog(`Cihaz: ${device.name}. GATT sunucusuna bağlanılıyor...`, "info");
            const server = await device.gatt.connect();
            
            printLog("Donanım servisleri taranıyor...", "info");
            
            // Aktif tarama ve eşleştirme döngüsü
            for (let protocol of SCOOTER_PROTOCOLS) {
                try {
                    printLog(`Sorgulanıyor: ${protocol.name}`, "info");
                    const service = await server.getPrimaryService(protocol.service);
                    scooterCharacteristic = await service.getCharacteristic(protocol.char);
                    
                    printLog(`🎉 Eşleşme Başarılı! Aktif Hat: ${protocol.name}`, "success");
                    break; 
                } catch (e) {
                    // Bu kapı boşsa listedeki bir sonrakine geç
                    continue;
                }
            }

            // Eğer listedeki hiçbir şey uyuşmadıysa alternatif derin tarama yapıp UUID'leri ekrana döker
            if (!scooterCharacteristic) {
                printLog("⚠️ Birincil kapılar uymadı! Cihazın gizli UUID kodları çözülüyor...", "pink");
                try {
                    const services = await server.getPrimaryServices();
                    printLog(`Bulunan Toplam Servis Sayısı: ${services.length}`, "neon");
                    for(let s of services) {
                        printLog(`Mevcut Servis UUID: ${s.uuid}`, "neon");
                    }
                } catch(scanError) {
                    printLog("Derin tarama iOS tarafından engellendi.", "pink");
                }
                throw new Error("Uygun kapı bulunamadı. Lütfen yukarıdaki UUID'leri kontrol edin.");
            }

        } catch (error) {
            printLog(`Bağlantı Hatası: ${error.message || error}`, "pink");
        }
    }

    function createPacket(payload) {
        let header = [0x55, 0xAA];
        let len = payload.length;
        let packet = header.concat([len], payload);
        let sum = 0;
        for(let i = 2; i < packet.length; i++) sum += packet[i];
        let checksum = (sum ^ 0xFFFF) & 0xFFFF;
        packet.push(checksum & 0xFF);
        packet.push((checksum >> 8) & 0xFF);
        return new Uint8Array(packet);
    }

    async function setZeroStart() {
        if (!scooterCharacteristic) {
            printLog("Hata: Önce bağlantı kurmalısınız!", "pink");
            return;
        }
        printLog("Zero Start komutu gönderiliyor...", "info");
        let packet = createPacket([0x03, 0x20, 0x3A, 0x00]);
        try {
            await scooterCharacteristic.writeValue(packet);
            printLog("Zero Start başarıyla tetiklendi!", "success");
        } catch(err) {
            printLog(`Yazma Hatası: ${err.message || err}`, "pink");
        }
    }

    async function setSpeed22() {
        if (!scooterCharacteristic) {
            printLog("Hata: Önce bağlantı kurmalısınız!", "pink");
            return;
        }
        printLog("Hız limiti komutu gönderiliyor...", "info");
        let packet = createPacket([0x03, 0x20, 0x3B, 0x16]);
        try {
            await scooterCharacteristic.writeValue(packet);
            printLog("Hız sınırı 22 km/h olarak güncellendi!", "success");
        } catch(err) {
            printLog(`Yazma Hatası: ${err.message || err}`, "pink");
        }
    }
</script>

</body>
</html>
